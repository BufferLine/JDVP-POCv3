name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone JDVP protocol
        run: git clone --depth 1 https://github.com/BufferLine/JDVP-protocol.git vendor/JDVP-protocol

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip -r requirements-dev.txt

      - name: Compile Python sources
        run: python -m compileall src tests scripts

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Validate repository contracts
        run: python scripts/validate_contracts.py
