name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip -r requirements-dev.txt

      - name: Compile Python sources
        run: python -m compileall src tests scripts

      - name: Validate repository contracts
        run: python scripts/validate_contracts.py
